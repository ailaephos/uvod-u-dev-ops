name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  packages: write
  
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Create security reports directory
        run: mkdir -p security

      - name: Build api image
        run: docker build -t ticketing-api:ci ./api

      - name: Scan api image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ticketing-api:ci
          severity: CRITICAL,HIGH
          exit-code: '1'
          format: table
          output: security/trivy-api-report.txt

      - name: Build worker image
        run: docker build -t ticketing-worker:ci ./worker

      - name: Scan worker image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ticketing-worker:ci
          severity: CRITICAL,HIGH
          exit-code: '1'
          format: table
          output: security/trivy-worker-report.txt

      - name: Build frontend image
        run: docker build -t ticketing-frontend:ci ./frontend

      - name: Scan frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ticketing-frontend:ci
          severity: CRITICAL,HIGH
          exit-code: '1'
          format: table
          output: security/trivy-frontend-report.txt

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push images
        run: |
          TAG=${GITHUB_SHA::7}
          for svc in api worker frontend; do
            docker tag ticketing-$svc:ci ghcr.io/${{ github.repository }}/ticketing-$svc:$TAG
            docker tag ticketing-$svc:ci ghcr.io/${{ github.repository }}/ticketing-$svc:latest
            docker push ghcr.io/${{ github.repository }}/ticketing-$svc:$TAG
            docker push ghcr.io/${{ github.repository }}/ticketing-$svc:latest
          done

      - name: Commit security reports
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add security/ || true
          git diff --cached --quiet || git commit -m "Update Trivy security reports [skip ci]"
          git push || true